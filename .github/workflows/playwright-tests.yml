name: Playwright E2E Tests

on:
  push:
    branches: [master, sqlite]
  pull_request:
    branches: [master, sqlite]
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Clojure CLI
        uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: 'latest'

      - name: Cache Clojure dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.clojure/.cpcache
          key: ${{ runner.os }}-clojure-${{ hashFiles('**/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clojure-

      - name: Download Clojure dependencies
        run: clojure -P -M:dev-server

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Download vendored JS dependencies
        run: |
          mkdir -p resources/public/vendor/cdn.jsdelivr.net/npm/htmx.org@2.0.5/dist
          mkdir -p resources/public/vendor/unpkg.com/idiomorph@0.7.3/dist
          mkdir -p resources/public/vendor/unpkg.com
          mkdir -p resources/public/vendor/cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.6
          mkdir -p resources/public/vendor/cdn.jsdelivr.net/gh/starfederation/datastar@1.0.0-beta.9/bundles
          curl -sfL -o resources/public/vendor/cdn.jsdelivr.net/npm/htmx.org@2.0.5/dist/htmx.min.js https://cdn.jsdelivr.net/npm/htmx.org@2.0.5/dist/htmx.min.js
          curl -sfL -o resources/public/vendor/unpkg.com/idiomorph@0.7.3.js https://unpkg.com/idiomorph@0.7.3.js
          curl -sfL -o resources/public/vendor/unpkg.com/idiomorph@0.7.3/dist/idiomorph-ext.min.js https://unpkg.com/idiomorph@0.7.3/dist/idiomorph-ext.min.js
          curl -sfL -o resources/public/vendor/unpkg.com/hyperscript.org@0.9.14.js https://unpkg.com/hyperscript.org@0.9.14.js
          curl -sfL -o resources/public/vendor/cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.6/purify.min.js https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.6/purify.min.js
          curl -sfL -o resources/public/vendor/cdn.jsdelivr.net/gh/starfederation/datastar@1.0.0-beta.9/bundles/datastar.js https://cdn.jsdelivr.net/gh/starfederation/datastar@1.0.0-beta.9/bundles/datastar.js

      - name: Create config.env
        run: |
          printf '%s\n' \
            'DOMAIN=localhost' \
            'NREPL_PORT=7888' \
            'COOKIE_SECRET=YWFhYWFhYWFhYWFhYWFhYQ==' \
            'JWT_SECRET=YWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWE=' \
            "ADMIN_IDS='#{}'" \
            'XTDB_TOPOLOGY=standalone' \
            > config.env

      - name: Start Yakread server
        run: |
          clojure -M:dev-server -- nrepl --port 7888 &
          echo $! > /tmp/yakread.pid
          # Wait for server to be ready
          for i in $(seq 1 60); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/signin | grep -q "200"; then
              echo "Server is ready"
              break
            fi
            echo "Waiting for server... ($i/60)"
            sleep 5
          done

      - name: Seed test data
        run: |
          # Use nREPL to insert seed data
          for i in $(seq 1 30); do
            if echo "(do (require '[seed]) (seed/seed! @com.yakread/system))" | clojure -Sdeps '{:deps {nrepl/nrepl {:mvn/version "1.0.0"}}}' -M -m nrepl.cmdline --connect --host localhost --port 7888 2>&1 | grep -q "Seed data inserted"; then
              echo "Seed data inserted"
              break
            fi
            echo "Retrying seed data... ($i/30)"
            sleep 2
          done

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Stop Yakread server
        if: always()
        run: |
          if [ -f /tmp/yakread.pid ]; then
            kill $(cat /tmp/yakread.pid) 2>/dev/null || true
          fi
