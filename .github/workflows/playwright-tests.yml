name: Playwright E2E Tests

on:
  push:
    branches: [master, sqlite]
  pull_request:
    branches: [master, sqlite]
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Clojure CLI
        uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: 'latest'

      - name: Cache Clojure dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.clojure/.cpcache
          key: ${{ runner.os }}-clojure-${{ hashFiles('**/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clojure-

      - name: Download Clojure dependencies
        run: clojure -P -M:run

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create config.env
        run: |
          printf '%s\n' \
            'DOMAIN=localhost' \
            'NREPL_PORT=7888' \
            'COOKIE_SECRET=YWFhYWFhYWFhYWFhYWFhYQ==' \
            'JWT_SECRET=YWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWE=' \
            "ADMIN_IDS='#{}'" \
            'XTDB_TOPOLOGY=standalone' \
            > config.env

      - name: Start Yakread server
        run: |
          clojure -J"--add-opens=java.base/java.nio=ALL-UNNAMED" \
            -J"-Dio.netty.tryReflectionSetAccessible=true" \
            -J"-Djdk.attach.allowAttachSelf" \
            -J"--add-exports=java.base/sun.nio.ch=ALL-UNNAMED" \
            -J"--add-exports=java.base/sun.security.action=ALL-UNNAMED" \
            -J"-XX:-OmitStackTraceInFastThrow" \
            -J"-XX:+CrashOnOutOfMemoryError" \
            -J"-Dbiff.env.BIFF_PROFILE=dev" \
            -M -m com.yakread -- nrepl --port 7888 &
          echo $! > /tmp/yakread.pid
          # Wait for server to be ready
          for i in $(seq 1 60); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/signin | grep -q "200"; then
              echo "Server is ready"
              break
            fi
            echo "Waiting for server... ($i/60)"
            sleep 5
          done

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Stop Yakread server
        if: always()
        run: |
          if [ -f /tmp/yakread.pid ]; then
            kill $(cat /tmp/yakread.pid) 2>/dev/null || true
          fi
